name: convoynew
description: "Convoy — Truck logistics app prototype."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
